<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malaria Detection Login</title>

<style>

body{
font-family: Arial, sans-serif;

background:url("https://img.freepik.com/free-vector/clean-medical-background_53876-97927.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-card{

background:rgba(255,255,255,0.85);
padding:40px;
width:360px;
border-radius:15px;
text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.2);
backdrop-filter:blur(8px);

}

h1{
color:#2b7a78;
margin-bottom:25px;
}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:8px;
border:1px solid #cfd8dc;

background:#f7fbfc;
font-size:15px;

}

button{

width:100%;
padding:12px;
margin-top:15px;

border:none;
border-radius:8px;

background:linear-gradient(90deg,#2bb6a3,#58d0c2);
color:white;

font-size:16px;
cursor:pointer;

transition:0.3s;

}

button:hover{
background:linear-gradient(90deg,#1fa392,#44b8aa);
}

p{
margin-top:20px;
color:#555;
}

a{
text-decoration:none;
color:#2bb6a3;
font-weight:bold;
}

</style>
</head>

<body>

<div class="login-card">

<h1>Malaria Detection System</h1>

<form method="POST">

<input type="text" name="username" placeholder="Enter username" required>

<input type="password" name="password" placeholder="Enter password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>

</div>

</body>
</html>
